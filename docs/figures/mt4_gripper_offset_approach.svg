<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">MT4 gripper offset and top-down approach schematic</title>
  <desc id="desc">Side-view schematic showing the current arm-end target, the future downward-mounted gripper, the corrected lower contact target, and a top-down approach path.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#1d4ed8"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#15803d"/>
    </marker>
    <marker id="arrowRed" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#b91c1c"/>
    </marker>
    <style>
      .bg { fill: #fbfbf7; }
      .panel { fill: #ffffff; stroke: #d7d7cf; stroke-width: 2; rx: 8; }
      .table { fill: #d8c2a3; stroke: #8a6a43; stroke-width: 3; }
      .arm { fill: none; stroke: #52525b; stroke-width: 28; stroke-linecap: round; stroke-linejoin: round; }
      .arm-shadow { fill: none; stroke: #d4d4d8; stroke-width: 36; stroke-linecap: round; stroke-linejoin: round; }
      .joint { fill: #f8fafc; stroke: #334155; stroke-width: 5; }
      .endbody { fill: #64748b; stroke: #334155; stroke-width: 4; rx: 8; }
      .gripper { fill: #dbeafe; stroke: #1d4ed8; stroke-width: 4; rx: 4; }
      .finger { fill: #bfdbfe; stroke: #1d4ed8; stroke-width: 4; rx: 3; }
      .target-old { fill: #fee2e2; stroke: #b91c1c; stroke-width: 4; }
      .target-new { fill: #dcfce7; stroke: #15803d; stroke-width: 4; }
      .object { fill: #fbbf24; stroke: #a16207; stroke-width: 4; rx: 7; }
      .danger { fill: #fef2f2; stroke: #ef4444; stroke-width: 2; stroke-dasharray: 9 7; }
      .axis { stroke: #18181b; stroke-width: 3; marker-end: url(#arrow); }
      .path { fill: none; stroke: #15803d; stroke-width: 6; stroke-linecap: round; stroke-dasharray: 16 12; marker-end: url(#arrowGreen); }
      .badpath { fill: none; stroke: #b91c1c; stroke-width: 5; stroke-linecap: round; stroke-dasharray: 10 10; marker-end: url(#arrowRed); }
      .dim { stroke: #0f766e; stroke-width: 3; marker-end: url(#arrowGreen); }
      .dim2 { stroke: #0f766e; stroke-width: 3; marker-end: url(#arrowGreen); marker-start: url(#arrowGreen); }
      .guide { stroke: #9ca3af; stroke-width: 2; stroke-dasharray: 7 7; }
      .txt { font-family: "Noto Sans CJK KR", "Apple SD Gothic Neo", "Malgun Gothic", Arial, sans-serif; fill: #18181b; }
      .h1 { font-size: 30px; font-weight: 800; }
      .h2 { font-size: 23px; font-weight: 800; }
      .body { font-size: 19px; font-weight: 600; }
      .small { font-size: 16px; font-weight: 500; }
      .note { font-size: 17px; font-weight: 700; }
      .red { fill: #991b1b; }
      .green { fill: #166534; }
      .blue { fill: #1e40af; }
      .muted { fill: #52525b; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="760"/>

  <text class="txt h1" x="52" y="54">MT4 좌표 영역 학습: 집게 하향 장착을 반영한 목표점 보정</text>
  <text class="txt body muted" x="52" y="88">URDF에는 집게 손가락이 없으므로, 학습에서는 가상 집게 끝점(tool tip)을 별도 기준점으로 둬야 한다.</text>

  <rect class="panel" x="44" y="120" width="570" height="520"/>
  <rect class="panel" x="666" y="120" width="570" height="520"/>

  <text class="txt h2 red" x="72" y="160">현재 해석: 로봇 끝 body 중심을 target에 맞춤</text>
  <text class="txt h2 green" x="694" y="160">제안: target은 낮추고, tool tip 기준으로 보상</text>

  <!-- Left panel table and object -->
  <rect class="table" x="76" y="550" width="490" height="38"/>
  <rect class="object" x="410" y="495" width="58" height="55"/>
  <text class="txt small muted" x="405" y="616">작업대 / 물체 실제 높이</text>

  <!-- Left panel robot -->
  <path class="arm-shadow" d="M150 520 L205 382 L324 305 L450 276"/>
  <path class="arm" d="M150 520 L205 382 L324 305 L450 276"/>
  <circle class="joint" cx="150" cy="520" r="34"/>
  <circle class="joint" cx="205" cy="382" r="27"/>
  <circle class="joint" cx="324" cy="305" r="24"/>
  <rect class="endbody" x="424" y="252" width="86" height="48"/>

  <circle class="target-old" cx="448" cy="250" r="20"/>
  <line x1="425" y1="250" x2="471" y2="250" stroke="#b91c1c" stroke-width="5"/>
  <line x1="448" y1="227" x2="448" y2="273" stroke="#b91c1c" stroke-width="5"/>
  <text class="txt note red" x="120" y="220">상단열 region 7/9: z=0.121m</text>
  <text class="txt small red" x="120" y="246">body 중심이 높은 target으로 끌려감</text>
  <path class="badpath" d="M260 204 C330 220 398 228 438 247"/>

  <rect class="danger" x="405" y="462" width="72" height="88"/>
  <text class="txt small red" x="95" y="472">실제 집게가 없거나 offset을 무시하면</text>
  <text class="txt small red" x="95" y="497">팔 끝/body가 물체 쪽으로 직접 들어가서</text>
  <text class="txt small red" x="95" y="522">충돌성 접근이 보상될 수 있음</text>

  <!-- Left axes -->
  <line class="axis" x1="92" y1="690" x2="195" y2="690"/>
  <line class="axis" x1="92" y1="690" x2="92" y2="600"/>
  <text class="txt small" x="205" y="696">X/front</text>
  <text class="txt small" x="68" y="592">Z/up</text>

  <!-- Right panel table and object -->
  <rect class="table" x="698" y="550" width="490" height="38"/>
  <rect class="object" x="1032" y="495" width="58" height="55"/>
  <text class="txt small muted" x="1020" y="616">물체 / 놓을 위치</text>

  <!-- Right panel robot -->
  <path class="arm-shadow" d="M772 520 L827 382 L946 305 L1068 276"/>
  <path class="arm" d="M772 520 L827 382 L946 305 L1068 276"/>
  <circle class="joint" cx="772" cy="520" r="34"/>
  <circle class="joint" cx="827" cy="382" r="27"/>
  <circle class="joint" cx="946" cy="305" r="24"/>
  <rect class="endbody" x="1044" y="252" width="86" height="48"/>

  <!-- Virtual downward gripper -->
  <rect class="gripper" x="1075" y="298" width="24" height="158"/>
  <rect class="finger" x="1052" y="450" width="22" height="52"/>
  <rect class="finger" x="1100" y="450" width="22" height="52"/>
  <circle class="target-new" cx="1087" cy="500" r="18"/>
  <line x1="1066" y1="500" x2="1108" y2="500" stroke="#15803d" stroke-width="5"/>
  <line x1="1087" y1="479" x2="1087" y2="521" stroke="#15803d" stroke-width="5"/>

  <line class="guide" x1="1068" y1="276" x2="1180" y2="276"/>
  <line class="guide" x1="1087" y1="500" x2="1180" y2="500"/>
  <line class="dim2" x1="1170" y1="286" x2="1170" y2="490"/>
  <text class="txt small blue" x="905" y="222">arm end/body center</text>
  <text class="txt small green" x="920" y="530">가상 집게 끝점 = 보상/성공 기준</text>
  <text class="txt small green" x="1000" y="568">낮춘 contact target</text>
  <text class="txt small blue" x="1185" y="370">tool length</text>
  <text class="txt small blue" x="1185" y="394">30~50mm 후보</text>

  <!-- Approach path -->
  <path class="path" d="M1087 196 L1087 330 L1087 480"/>
  <text class="txt note green" x="724" y="216">위쪽에서 접근: pregrasp는 target 위</text>
  <text class="txt small green" x="724" y="244">성공 조건은 body 중심이 아니라 tool tip과 물체 중심/표면 거리</text>

  <!-- Compensation formula box -->
  <rect x="700" y="650" width="500" height="70" rx="8" fill="#ecfdf5" stroke="#86efac" stroke-width="2"/>
  <text class="txt body green" x="724" y="678">보정 원칙</text>
  <text class="txt small" x="724" y="704">contact_target_z = 현재 region_z - tool_tip_offset_z 후보</text>
  <text class="txt small" x="724" y="728">pregrasp_z = contact_target_z + approach_standoff</text>

  <!-- Key data box -->
  <rect x="64" y="650" width="520" height="70" rx="8" fill="#fff7ed" stroke="#fdba74" stroke-width="2"/>
  <text class="txt body" x="88" y="678">현재 수치 힌트</text>
  <text class="txt small" x="88" y="704">Stage 1 상단열 7/8/9 z = 0.121333m, workspace z 범위 = 0.0755~0.1305m</text>
  <text class="txt small" x="88" y="728">7/9 실패는 카메라 region보다 y/z lateral 및 tool 기준점 부재 쪽으로 해석</text>
</svg>
